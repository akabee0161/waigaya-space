type Event {
  eventId: ID!
  title: String!
  description: String
  participantCode: String!
  createdAt: String!
  isActive: Boolean!
  tags: [String!]
  currentTag: String
}

type Comment {
  commentId: ID!
  eventId: ID!
  content: String!
  authorName: String!
  createdAt: String!
  reactions: AWSJSON
  tag: String
}

type CommentConnection {
  items: [Comment!]!
  nextToken: String
}

input CreateEventInput {
  title: String!
  description: String
  tags: [String!]
}

input PostCommentInput {
  eventId: ID!
  content: String!
  authorName: String!
  tag: String
}

type Query {
  getEvent(eventId: ID!): Event
  getEventByCode(participantCode: String!): Event
  listComments(eventId: ID!, limit: Int, nextToken: String): CommentConnection!
}

type Mutation {
  createEvent(input: CreateEventInput!): Event!
  postComment(input: PostCommentInput!): Comment!
  closeEvent(eventId: ID!): Event!
  reactToComment(eventId: ID!, commentCreatedAt: String!, emoji: String!, action: String!): Comment!
  setEventTags(eventId: ID!, tags: [String!]!): Event!
  broadcastTag(eventId: ID!, tag: String!): Event!
}

type Subscription {
  onCommentPosted(eventId: ID!): Comment
    @aws_subscribe(mutations: ["postComment"])
  onReactionUpdated(eventId: ID!): Comment
    @aws_subscribe(mutations: ["reactToComment"])
  onTagBroadcast(eventId: ID!): Event
    @aws_subscribe(mutations: ["broadcastTag"])
}
